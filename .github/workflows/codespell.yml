# Run codespell on codebase
# 
name: codespell

on:
    push:
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# Force to use color
env:
    FORCE_COLOR: true

jobs:
    codespell:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: codespell-project/actions-codespell@v2
