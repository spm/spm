name: Tests
on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * *'
    - cron: '40 16 * * 3'
jobs:
  configure:
    name: Configure test matrix (PR uses limited MATLAB versions)
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.config.outputs.versions }}
      is-pr: ${{ steps.config.outputs.is-pr }}
    steps:
      - name: Determine test configuration
        id: config
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "is-pr=true" >> $GITHUB_OUTPUT
            echo 'versions=["R2020a","latest"]' >> $GITHUB_OUTPUT
          else
            echo "is-pr=false" >> $GITHUB_OUTPUT
            echo 'versions=["R2020a","R2020b","R2021a","R2021b","R2022a","R2022b","R2023a","R2023b","R2024a","R2024b","R2025a","R2025b", "latest"]' >> $GITHUB_OUTPUT
          fi

  matlab-tests:
    name: Run MATLAB Tests
    needs: configure
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.configure.outputs.versions) }}
        os: ["ubuntu-latest", "macos-15-intel", "macos-latest", "windows-latest"] # macos-15-intel has Intel architecture, macos-latest has Apple Silicon
        exclude:
          - os: windows-latest
            version: "R2020a" # MATLAB not available
          - os: windows-latest
            version: "R2020b" # MATLAB not available
          - os: windows-latest
            version: "R2021a" # Compiler not available
          - os: windows-latest
            version: "R2021b" # Compiler not available
          - os: macos-latest
            version: "R2020a" # Apple Silicon version not available
          - os: macos-latest
            version: "R2020b" # Apple Silicon version not available
          - os: macos-latest
            version: "R2021a" # Apple Silicon version not available
          - os: macos-latest
            version: "R2021b" # Apple Silicon version not available
          - os: macos-latest
            version: "R2022a" # Apple Silicon version not available
          - os: macos-latest
            version: "R2022b" # Apple Silicon version not available
          - os: macos-latest
            version: "R2023a" # Apple Silicon version not available
          - os: macos-15-intel
            version: "latest" # MATLAB dropped Intel Mac support starting with R2026a
    runs-on: ${{matrix.os}}
    env:
      cache-key: tests-data2
    steps:
      - name: Install Visual C++ 2010 Redistributable (required by FieldTrip MEX files)
        if: runner.os == 'Windows'
        run: choco install vcredist2010 -y

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get latest commit for tests data  # shallow fetch to get revision
        id: checkout-tests-data
        if: ${{ needs.configure.outputs.is-pr == 'false' }}
        uses: actions/checkout@v4
        with:
          repository: spm/spm-tests-data
          token: ${{ secrets.TESTS_DATA_REPO_TOKEN }}
          path: tests/data
          fetch-depth: 1
          lfs: false
      - name: Remove shallow-checked-out repo
        if: ${{ needs.configure.outputs.is-pr == 'false' }}
        shell: bash
        run: rm -rf tests/data
      - name: Try to retrieve commit from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: tests/data
          key: ${{ env.cache-key }}-${{ steps.checkout-tests-data.outputs.commit }}
          restore-keys: ${{ env.cache-key }}
          enableCrossOsArchive: true
      - name: If cache missed, pull latest commit...
        id: checkout-tests-data-lfs
        if: ${{ needs.configure.outputs.is-pr == 'false' && steps.cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: spm/spm-tests-data
          token: ${{ secrets.TESTS_DATA_REPO_TOKEN }}
          path: tests/data
          lfs: true
      - name: ... and cache latest commit
        if: ${{ needs.configure.outputs.is-pr == 'false' && steps.cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: tests/data
          key: ${{ env.cache-key }}-${{ steps.checkout-tests-data.outputs.commit }}

      - name: Verify test data available
        shell: bash
        run: |
          if [ ! -d "tests/data" ] || [ -z "$(ls -A tests/data)" ]; then
            echo "::error::Test data not available. Cache may be empty or expired."
            exit 1
          fi

      - name: Set up MATLAB (legacy)
        if: ${{matrix.version == 'R2020a' || matrix.version == 'R2020b' || matrix.version == 'R2022a' || matrix.version == 'R2022b'}}
        uses: matlab-actions/setup-matlab@v1
        with:
          release: ${{matrix.version}}
      - name: Set up MATLAB
        if: ${{matrix.version != 'R2020a' && matrix.version != 'R2020b' && matrix.version != 'R2022a' && matrix.version != 'R2022b'}}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{matrix.version}}

      - name: Run regression tests with existing MEX files (legacy)
        if: ${{github.event.schedule == '40 16 * * 3' && (matrix.version == 'R2020a' || matrix.version == 'R2020b' || matrix.version == 'R2022a' || matrix.version == 'R2022b')}}
        uses: matlab-actions/run-command@v1
        with:
          command: addpath(pwd); results = spm_tests('class','regression','display',true,'junitxml',true); assert(all(~[results.Failed]));
      - name: Run unit tests with existing MEX files (legacy)
        if: ${{github.event.schedule != '40 16 * * 3' && (matrix.version == 'R2020a' || matrix.version == 'R2020b' || matrix.version == 'R2022a' || matrix.version == 'R2022b')}}
        uses: matlab-actions/run-command@v1
        with:
          command: addpath(pwd); results = spm_tests('class','unit','display',true,'junitxml',true); assert(all(~[results.Failed]));
      - name: Run regression tests with existing MEX files
        if: ${{github.event.schedule == '40 16 * * 3' && matrix.version != 'R2020a' && matrix.version != 'R2020b' && matrix.version != 'R2022a' && matrix.version != 'R2022b'}}
        uses: matlab-actions/run-command@v2
        with:
          command: addpath(pwd); results = spm_tests('class','regression','display',true,'junitxml',true); assert(all(~[results.Failed]));
      - name: Run unit tests with existing MEX files
        if: ${{github.event.schedule != '40 16 * * 3' && matrix.version != 'R2020a' && matrix.version != 'R2020b' && matrix.version != 'R2022a' && matrix.version != 'R2022b'}}
        uses: matlab-actions/run-command@v2
        with:
          command: addpath(pwd); results = spm_tests('class','unit','display',true,'junitxml',true); assert(all(~[results.Failed]));

      - name: Upload JUnit XML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-${{ matrix.version }}
          path: spm_tests_junit.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Compile MEX files
        run: |
          make -C src distclean
          make -C src
          make -C src install
        # make -C src external-distclean
        # make -C src external
        # make -C src external-install
      - name: Get MEX extension on Linux/macOS
        if: runner.os != 'Windows'
        run: echo "MEXEXT=$(mexext)" >> $GITHUB_ENV
      - name: Get MEX extension on Windows
        if: runner.os == 'Windows'
        run: echo "MEXEXT=$(mexext.bat)" >> $env:GITHUB_ENV
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spm-${{env.MEXEXT}}-${{runner.os}}-${{matrix.version}}
          path: ./**/*.${{env.MEXEXT}}
          retention-days: 1

  publish-test-results:
    name: Publish test results
    needs: matlab-tests
    runs-on: ubuntu-latest
    # Run even if (some) test jobs failed, so we still publish a per-test breakdown.
    # Skip only if the workflow was cancelled.
    if: always() && !cancelled()
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          path: junit-artifacts
          pattern: junit-*
          merge-multiple: false

      - name: Tag JUnit suites with OS / MATLAB version and write matrix summary
        shell: python {0}
        run: |
          import os, pathlib, xml.etree.ElementTree as ET
          root = pathlib.Path("junit-artifacts")
          summary_rows = []
          for d in sorted(root.iterdir()):
              if not d.is_dir() or not d.name.startswith("junit-"):
                  continue
              # junit-<os>-<version> — e.g. junit-windows-latest-R2024a,
              # junit-macos-15-intel-R2020a. The version is the last
              # hyphen-separated token; os keeps any internal hyphens.
              rest = d.name[len("junit-"):]
              os_name, _, version = rest.rpartition("-")
              label = f"{os_name}/{version}"
              totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}
              for xml in d.glob("*.xml"):
                  tree = ET.parse(xml)
                  for ts in tree.iter("testsuite"):
                      name = ts.get("name", "")
                      if not name.startswith(label + "/"):
                          ts.set("name", f"{label}/{name}")
                      for k in totals:
                          totals[k] += int(ts.get(k, "0") or 0)
                  tree.write(xml, encoding="utf-8", xml_declaration=True)
              summary_rows.append((os_name, version, totals))

          lines = ["## Test matrix summary", "",
                   "| OS | MATLAB | Tests | Failures | Errors | Skipped |",
                   "|---|---|---:|---:|---:|---:|"]
          for os_name, version, t in sorted(summary_rows):
              marker = " :x:" if (t["failures"] or t["errors"]) else ""
              lines.append(
                  f"| {os_name} | {version} | {t['tests']} | "
                  f"{t['failures']}{marker} | {t['errors']} | {t['skipped']} |"
              )
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")

      - name: Publish aggregated test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          # One file per matrix job; filenames are unique because of the
          # artifact name (matrix os + MATLAB version) used as the directory.
          files: junit-artifacts/**/*.xml
          check_name: "Test Results (per test)"
          comment_mode: always
          # Don't fail this job — the matrix jobs already encode pass/fail
          # status. This job's purpose is purely reporting.
          fail_on: nothing
          action_fail: false
          # List each matrix run separately when a test fails on a subset of
          # the matrix, so OS/version attribution is visible in drill-in.
          report_individual_runs: true
          check_run_annotations: all tests
