name: Compile MEX
on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.cpp'
      - '**/*.hpp'

jobs:
  compile_mex:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # On Linux, the OS version should be as old as possible for mex compatibility.
          - os: ubuntu-22.04
            os_name: Linux
            mex_ext: mexa64
            matlab_release: R2020a
            matlab_legacy: true
          # On Mac and Windows, only the Matlab version matters for mex compatibility, so the OS can be the latest.  
          - os: macos-15-intel
            os_name: macOS_Intel
            mex_ext: mexmaci64
            matlab_release: R2020a
            matlab_legacy: true
          - os: macos-latest
            os_name: macOS_Apple_Silicon
            mex_ext: mexmaca64
            matlab_release: R2023b
            matlab_legacy: false
          - os: windows-latest
            os_name: Windows
            mex_ext: mexw64
            matlab_release: R2022a
            matlab_legacy: true

    steps:
      - name: Set up MATLAB (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v1
        with:
          release: ${{ matrix.matlab_release }}
      - name: Set up MATLAB
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab_release }}
      - name: Checkout SPM
        uses: actions/checkout@v4

      - name: Delete old MEX files on Ubuntu and Mac
        if: matrix.os != 'windows-latest'
        run: find . -type f -name "*.mex*" -delete

      - name: Delete old MEX files on Windows
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem -Path .\ -Recurse -Include *.mex* | Remove-Item -Force

      - name: Compile MEX files
        run: |
          make -C src distclean
          make -C src
          make -C src install
          # make -C src external-distclean # on windows there is an issue with fieldtrip
          # make -C src external
          # make -C src external-install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spm-mex-${{ matrix.os_name }}
          path: ./**/*.${{ matrix.mex_ext }}
          retention-days: 1

  collect_mex_files:
    runs-on: ubuntu-latest
    needs: compile_mex
    steps:
      - name: Download all MEX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spm-mex-*
          merge-multiple: true

      - name: Upload all mex files as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spm-mex-all
          path: .
