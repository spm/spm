name: Compile MEX
on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.cpp'
      - '**/*.hpp'
      # Vendored toolboxes (fieldtrip, bemcp, ctf, ...) ship precompiled MEX and
      # are not built by `make -C src`, so their changes must not trigger this.
      - '!external/**'

jobs:
  compile_mex:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # On Linux, the OS version should be as old as possible for mex compatibility.
          - os: ubuntu-22.04
            os_name: Linux
            mex_ext: mexa64
            matlab_release: R2020a
            matlab_legacy: true
          # On Mac and Windows, only the Matlab version matters for mex compatibility, so the OS can be the latest.  
          - os: macos-15-intel
            os_name: macOS_Intel
            mex_ext: mexmaci64
            matlab_release: R2020a
            matlab_legacy: true
          - os: macos-latest
            os_name: macOS_Apple_Silicon
            mex_ext: mexmaca64
            matlab_release: R2023b
            matlab_legacy: false
          - os: windows-latest
            os_name: Windows
            mex_ext: mexw64
            matlab_release: R2022a
            matlab_legacy: true

    steps:
    
      - name: Configure MinGW
        # GitHub Actions provides MinGW in C:\mingw64 but MATLAB on Windows
        # does not automatically detect it. Explicitly set MW_MINGW64_LOC.      
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "MW_MINGW64_LOC=C:\mingw64" >> $env:GITHUB_ENV
    
      - name: Set up MATLAB (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@aa8bbc7b76daa63c5d456d1430cbd6cb5b626ab4
        with:
          release: ${{ matrix.matlab_release }}
      - name: Set up MATLAB
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@aa8bbc7b76daa63c5d456d1430cbd6cb5b626ab4
        with:
          release: ${{ matrix.matlab_release }}
      - name: Checkout SPM
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Delete old MEX files on Ubuntu and Mac
        if: matrix.os != 'windows-latest'
        run: find . -type f -name "*.mex*" -delete

      - name: Delete old MEX files on Windows
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem -Path .\ -Recurse -Include *.mex* | Remove-Item -Force

      - name: Compile MEX files
        run: |
          make -C src distclean
          make -C src
          make -C src install
          # make -C src external-distclean # on windows there is an issue with fieldtrip
          # make -C src external
          # make -C src external-install

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: spm-mex-${{ matrix.os_name }}
          path: ./**/*.${{ matrix.mex_ext }}
          retention-days: 1

  collect_mex_files:
    runs-on: ubuntu-latest
    needs: compile_mex
    steps:
      - name: Download all MEX artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: spm-mex-*
          merge-multiple: true

      - name: Upload all mex files as Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: spm-mex-all
          path: .
